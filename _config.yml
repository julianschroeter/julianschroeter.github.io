title: Julian Schröter
tagline: Professor of Digital Literary Studies
description: >
  Professor of Digital Literary Studies at LMU Munich.
  Research in computational literary studies, machine learning,
  genre theory, and nineteenth-century German literature.

lang: en
timezone: Europe/Berlin

url: "https://julianschroeter.github.io"
baseurl: ""

github:
  username: julianschroeter

social:
  name: Julian Schröter
  email: j.schroeter@lmu.de
  links:
    - https://github.com/julianschroeter

theme_mode: light
avatar: "/assets/img/avatar.jpg"
social_preview_image:

toc: true
comments:
  provider:

paginate: 10
permalink: /posts/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
